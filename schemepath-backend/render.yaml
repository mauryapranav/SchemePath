services:
  - type: web
    name: schemepath-api
    runtime: python
    region: singapore        # closest to India; change to oregon/frankfurt as needed
    plan: free               # upgrade to starter for always-on

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: NEO4J_URI
        sync: false          # set manually in Render dashboard
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
